<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAL</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fcfbf8;color:#1a1a18;font-family:'Source Serif 4',Georgia,serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:#1a1a18;color:#fcfbf8}

.col{max-width:640px;margin:0 auto;padding:0 20px}

/* NAV */
nav{padding:16px 0;border-bottom:1px solid #e5e4e0;display:flex;align-items:center;justify-content:space-between}
nav a{font-family:'Libre Franklin',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;text-decoration:none}
nav a:hover{color:#1a1a18}
nav .home{color:#1a1a18}
.toc-btn{cursor:pointer;border:none;background:none;font-family:'Libre Franklin',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;padding:0}
.toc-btn:hover{color:#1a1a18}

/* TOC */
.toc{display:none;padding:16px 0;border-bottom:1px solid #e5e4e0}
.toc.open{display:block}
.toc a{display:block;padding:6px 0;font-size:14.5px;color:#666;text-decoration:none}
.toc a:hover{color:#1a1a18}
.toc a.active{color:#1a1a18;font-weight:600}

/* ARTICLE — markdown renders here */
#content{padding:64px 0 48px}
#content h1{font-size:clamp(28px,5vw,42px);line-height:1.25;font-weight:700;margin-bottom:16px}
#content h2{font-family:'Libre Franklin',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1a1a18;margin:56px 0 16px;padding-top:24px;border-top:1px solid #e5e4e0}
#content h3{font-size:20px;font-weight:600;margin:40px 0 12px;line-height:1.3}
#content p{font-size:17.5px;line-height:1.78;margin-bottom:1.4em;color:#2a2a28}
#content a{color:#1a1a18;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#ccc}
#content a:hover{text-decoration-color:#1a1a18}
#content strong{font-weight:600;color:#1a1a18}
#content em{font-style:italic}
#content blockquote{margin:32px 0;padding:0 0 0 20px;border-left:2px solid #1a1a18}
#content blockquote p{font-size:18px;font-weight:300;font-style:italic;color:#1a1a18;line-height:1.6}
#content ul,#content ol{margin:0 0 1.4em 24px;font-size:17.5px;line-height:1.78;color:#2a2a28}
#content li{margin-bottom:0.5em}
#content hr{border:none;border-top:1px solid #e5e4e0;margin:48px 0}
#content img{max-width:100%;height:auto}

/* PREV/NEXT */
.pn{display:flex;justify-content:space-between;padding:48px 0;border-top:2px solid #1a1a18;margin-top:48px;gap:24px}
.pn a{font-family:'Libre Franklin',sans-serif;font-size:13px;font-weight:500;color:#888;text-decoration:none;line-height:1.4}
.pn a:hover{color:#1a1a18}
.pn a span{display:block;font-size:15px;color:#1a1a18;font-family:'Source Serif 4',Georgia,serif;margin-top:2px}
.pn .next{text-align:right}

/* FOOTER */
footer{padding:32px 0;border-top:1px solid #e5e4e0}
footer p{font-size:12px;color:#999;line-height:1.8;font-family:'Libre Franklin',sans-serif}
footer a{color:#666;text-decoration:underline}

.loading{padding:120px 0;text-align:center;color:#ccc;font-size:14px;font-family:'Libre Franklin',sans-serif}
</style>
</head>
<body>
<div class="col">

<nav>
<a href="index.html" class="home">Deal</a>
<button class="toc-btn" onclick="document.querySelector('.toc').classList.toggle('open')">Contents</button>
</nav>

<div class="toc" id="toc"></div>

<div id="content"><div class="loading">Loading…</div></div>

<div class="pn" id="prevnext"></div>

<footer>
<p>DEAL is a seven-part sourced series. 423 links across 90+ outlets.<br>
<a href="index.html">Return to overview</a></p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const parts = [
  {slug:'the-closing', file:'the-closing.md', short:'I. The Closing'},
  {slug:'the-underwriters', file:'the-underwriters.md', short:'II. The Underwriters'},
  {slug:'the-co-signers', file:'the-co-signers.md', short:'III. The Co-Signers'},
  {slug:'the-counterparties', file:'the-counterparties.md', short:'IV. The Counterparties'},
  {slug:'the-hedge', file:'the-hedge.md', short:'V. The Hedge'},
  {slug:'the-collateral', file:'the-collateral.md', short:'VI. The Collateral'},
  {slug:'the-handshake', file:'the-handshake.md', short:'VII. The Handshake'},
];

function getCurrentSlug() {
  return window.location.hash.replace('#','') || 'the-closing';
}

function render() {
  const slug = getCurrentSlug();
  const idx = parts.findIndex(p => p.slug === slug);
  const part = parts[idx] || parts[0];

  document.title = part.short + ' — DEAL';

  // TOC
  document.getElementById('toc').innerHTML = parts.map(p =>
    `<a href="#${p.slug}" class="${p.slug===slug?'active':''}">${p.short}</a>`
  ).join('');

  // Prev/next
  const pn = document.getElementById('prevnext');
  let h = '';
  if (idx > 0) {
    h += `<a href="#${parts[idx-1].slug}" class="prev">← Previous<span>${parts[idx-1].short}</span></a>`;
  } else {
    h += `<a href="index.html" class="prev">← Overview<span>DEAL</span></a>`;
  }
  if (idx < parts.length-1) {
    h += `<a href="#${parts[idx+1].slug}" class="next">Next →<span>${parts[idx+1].short}</span></a>`;
  }
  pn.innerHTML = h;

  // Load markdown
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading…</div>';
  fetch('md/' + part.file)
    .then(r => { if(!r.ok) throw new Error(); return r.text(); })
    .then(md => {
      content.innerHTML = marked.parse(md);
      window.scrollTo(0,0);
      document.querySelector('.toc').classList.remove('open');
    })
    .catch(() => {
      content.innerHTML = '<p style="padding:120px 0;text-align:center;color:#999">This installment is not yet available.</p>';
    });
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
