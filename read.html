<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cost of the Deal</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<style>
/* ── THEME TOKENS ── */
:root{
  --bg:#fcfbf8;
  --fg:#1a1a18;
  --fg2:#2a2a28;
  --fg3:#555;
  --mute:#777;
  --faint:#999;
  --ghost:#bbb;
  --rule:#e5e4e0;
  --rule-heavy:#1a1a18;
  --link-line:#ccc;
  --select-bg:#1a1a18;
  --select-fg:#fcfbf8;
  --code-bg:#f0efeb;
  --code-border:#e5e4e0;
}
html.dark{
  --bg:#141413;
  --fg:#e8e6e1;
  --fg2:#ccc9c2;
  --fg3:#a09d96;
  --mute:#8a8780;
  --faint:#6b6862;
  --ghost:#4a4844;
  --rule:#2a2926;
  --rule-heavy:#e8e6e1;
  --link-line:#4a4844;
  --select-bg:#e8e6e1;
  --select-fg:#141413;
  --code-bg:#1e1d1b;
  --code-border:#2a2926;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Source Serif 4',Georgia,serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background 0.25s,color 0.25s}
::selection{background:var(--select-bg);color:var(--select-fg)}
a{transition:color 0.15s,border-color 0.15s}

.col{max-width:640px;margin:0 auto;padding:0 20px}

/* NAV — sticky */
nav{position:sticky;top:0;z-index:100;background:var(--bg);padding:14px 20px;border-bottom:2px solid var(--rule-heavy);display:flex;align-items:center;justify-content:space-between;width:100%;transition:background 0.25s}
nav a{font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--faint);text-decoration:none}
nav a:hover{color:var(--fg)}
nav .home{color:var(--fg);letter-spacing:0.35em}
.nav-right{display:flex;align-items:center;gap:16px}
.toc-btn,.theme-btn{cursor:pointer;border:none;background:none;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint);padding:0;transition:color 0.15s}
.toc-btn:hover,.theme-btn:hover{color:var(--fg)}
/* Current article label */
.nav-current{font-family:'Libre Franklin',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ghost);display:none}
@media(min-width:640px){.nav-current{display:block}}

/* Progress bar */
.progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--fg);z-index:101;transition:width 0.1s linear;pointer-events:none}

/* TOC */
.toc{max-height:0;overflow:hidden;padding:0 20px;border-bottom:1px solid transparent;width:100%;position:sticky;top:46px;z-index:99;background:var(--bg);transition:max-height 0.3s ease,padding 0.3s ease,border-color 0.3s ease,background 0.25s}
.toc.open{max-height:80vh;overflow-y:auto;padding:20px 20px;border-bottom-color:var(--rule)}
.toc a{display:block;padding:7px 0;font-size:14.5px;color:var(--mute);text-decoration:none;transition:color 0.15s}
.toc a:hover{color:var(--fg)}
.toc a.active{color:var(--fg);font-weight:600}
.toc a .part-num{color:var(--ghost);font-size:12px;margin-right:6px;font-variant-numeric:tabular-nums}
/* Section links within TOC */
.toc .toc-sections{margin-top:8px;padding-top:8px;border-top:1px solid var(--rule)}
.toc .toc-sections a{font-size:13px;padding:5px 0 5px 18px;color:var(--faint);position:relative}
.toc .toc-sections a::before{content:'';position:absolute;left:4px;top:50%;width:6px;height:1px;background:var(--ghost)}
.toc .toc-sections a:hover{color:var(--fg)}
.toc .toc-sections a.active-section{color:var(--fg);font-weight:500}

/* ── ARTICLE ── */
#content{padding:72px 0 48px;animation:fade 0.5s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* Title */
#content h1{font-size:clamp(30px,5.5vw,46px);line-height:1.18;font-weight:700;margin-bottom:0;letter-spacing:-0.01em;color:var(--fg)}

/* Dek — the bold subtitle line right after h1 */
#content .dek{font-size:17px;color:var(--mute);line-height:1.65;margin:14px 0 0;font-weight:400;font-style:italic;max-width:540px}
#content .dek strong{font-weight:400;color:var(--mute)}

/* Opening rule — invisible spacer, lets the first h2 border do the work */
#content .opening-rule{border:none;margin:28px 0 0;height:0}

/* Lead paragraph */
#content .lead{font-size:18.5px;line-height:1.75;color:var(--fg);margin-bottom:1.6em}

/* Body defaults */
#content h2{font-family:'Libre Franklin',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg);margin:20px 0 20px;padding-top:28px;border-top:2px solid var(--rule-heavy)}

/* Suppress double rule: h2 right after opening-rule spacer */
#content .opening-rule+h2{margin-top:0}

/* Short h2s (like "You.") — display larger, as a statement */
#content h2.statement{font-family:'Source Serif 4',Georgia,serif;font-size:clamp(24px,4vw,32px);font-weight:700;letter-spacing:-0.01em;text-transform:none;padding-top:32px;margin-bottom:8px}

#content h3{font-size:19px;font-weight:600;margin:44px 0 12px;line-height:1.3;color:var(--fg)}
#content p{font-size:17.5px;line-height:1.82;margin-bottom:1.5em;color:var(--fg2)}
#content a{color:var(--fg);text-decoration:none;border-bottom:1px solid var(--link-line)}
#content a:hover{border-bottom-color:var(--fg)}
#content strong{font-weight:700;color:var(--fg)}
#content em{font-style:italic}

/* Blockquotes */
#content blockquote{margin:36px 0;padding:0 0 0 24px;border-left:2px solid var(--rule-heavy)}
#content blockquote p{font-size:18px;font-weight:300;font-style:italic;color:var(--fg);line-height:1.65}

/* Lists */
#content ul,#content ol{margin:0 0 1.5em 0;padding:0;list-style:none;font-size:17.5px;line-height:1.82;color:var(--fg2)}
#content li{margin-bottom:0.7em;padding-left:20px;position:relative}
#content li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:1px;background:var(--faint)}
#content li strong{font-weight:700}

/* Timeline-style list items — just regular items, bold date inline */
#content li.tl-item strong{font-weight:700}

#content hr{border:none;margin:20px 0}
#content img{max-width:100%;height:auto;display:block}
#content p:empty{display:none}

/* ── FIGURES ── */
#content figure{margin:40px 0;padding:0}
#content figure img{width:100%;height:auto;display:block}
#content figcaption{font-family:'Libre Franklin',sans-serif;font-size:12.5px;line-height:1.6;color:var(--mute);margin-top:10px;padding-top:8px;border-top:1px solid var(--rule)}
#content figcaption .credit{color:var(--faint);font-size:11px;display:block;margin-top:2px}

/* Wide figures — break out of .col */
#content figure.wide{margin-left:calc(-50vw + 50%);margin-right:calc(-50vw + 50%);width:100vw;max-width:100vw}
#content figure.wide figcaption{max-width:640px;margin-left:auto;margin-right:auto;padding-left:20px;padding-right:20px}

/* Small figures — constrained width, left-aligned */
#content figure.sm{max-width:240px}
#content figure.md{max-width:360px}

/* Right-floated variant */
#content figure.right{float:right;margin:0 0 24px 32px}
#content figure.left{float:left;margin:0 32px 24px 0}

/* Clear after floated figures */
#content h2,#content h3,#content hr{clear:both}
#content hr+p:empty,#content p:empty+hr{display:none}
#content p br:only-child{display:none}

/* ── PER-ARTICLE OVERRIDES ── */
body[data-slug="the-collateral"] #content .lead{font-size:19px;font-weight:400}
body[data-slug="the-handshake"] #content .lead{font-size:19px}

/* The Collateral: "You." centered statement */
body[data-slug="the-collateral"] #content h2.statement.reveal{
  text-align:center;
  font-size:clamp(32px,6vw,48px);
  padding:80px 0 40px;
  border-top:none;
}

/* ── PREV/NEXT ── */
.pn{display:flex;justify-content:space-between;padding:48px 0;border-top:2px solid var(--rule-heavy);margin-top:56px;gap:24px}
.pn a{font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);text-decoration:none;line-height:1.4;transition:color 0.15s}
.pn a:hover{color:var(--fg)}
.pn a span{display:block;font-size:15.5px;color:var(--fg);font-family:'Source Serif 4',Georgia,serif;margin-top:4px;font-weight:400;text-transform:none;letter-spacing:0}
.pn .next{text-align:right}

/* ── FOOTER ── */
footer{padding:32px 0;border-top:1px solid var(--rule)}
footer p{font-size:11px;color:var(--ghost);line-height:1.8;font-family:'Libre Franklin',sans-serif;letter-spacing:0.02em}
footer a{color:var(--faint);text-decoration:none;border-bottom:1px solid var(--rule);transition:color 0.15s,border-color 0.15s}
footer a:hover{color:var(--fg);border-bottom-color:var(--fg)}

.loading{padding:120px 0;text-align:center;color:var(--ghost);font-size:13px;font-family:'Libre Franklin',sans-serif;letter-spacing:0.1em;text-transform:uppercase}
</style>
</head>
<body>


<div class="progress" id="progress"></div>

<nav>
<a href="index.html" class="home">The Cost of the Deal</a>
<span class="nav-current" id="navCurrent"></span>
<div class="nav-right">
<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" id="themeToggle"></button>
<button class="toc-btn" onclick="document.querySelector('.toc').classList.toggle('open')">Contents &#9662;</button>
</div>
</nav>

<div class="toc" id="toc"></div>

<div class="col">

<div id="content"><div class="loading">Loading&hellip;</div></div>

<div class="pn" id="prevnext"></div>

<footer>
<p><a href="index.html">Return to overview</a></p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
/* ── Theme toggle ── */
function isDark(){return document.documentElement.classList.contains('dark')}
function setThemeLabel(){document.getElementById('themeToggle').textContent=isDark()?'Light':'Dark'}
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme',isDark()?'dark':'light');
  setThemeLabel();
}
setThemeLabel();

/* ── Parts ── */
const parts = [
  {slug:'the-closing', file:'the-closing.md', short:'I. The Closing'},
  {slug:'the-underwriters', file:'the-underwriters.md', short:'II. The Underwriters'},
  {slug:'the-co-signers', file:'the-co-signers.md', short:'III. The Co-Signers'},
  {slug:'the-counterparties', file:'the-counterparties.md', short:'IV. The Counterparties'},
  {slug:'the-hedge', file:'the-hedge.md', short:'V. The Hedge'},
  {slug:'the-collateral', file:'the-collateral.md', short:'VI. The Collateral'},
  {slug:'the-handshake', file:'the-handshake.md', short:'VII. The Handshake'},
];

function getCurrentSlug() {
  return window.location.hash.replace('#','') || 'the-closing';
}

/* ── Post-process rendered HTML ── */
function enhance(el) {
  // 1. Dek: the <p> immediately after <h1> whose content is all bold
  const h1 = el.querySelector('h1');
  if (h1) {
    const next = h1.nextElementSibling;
    if (next && next.tagName === 'P') {
      const strong = next.querySelector('strong');
      if (strong && strong.textContent.trim() === next.textContent.trim()) {
        next.classList.add('dek');
      }
    }
  }

  // 2. Opening rule: first <hr> becomes invisible spacer
  const firstHr = el.querySelector('hr');
  if (firstHr) {
    firstHr.classList.add('opening-rule');

    // 3. Lead paragraph: first <p> after the opening section
    let sib = firstHr.nextElementSibling;
    while (sib && (sib.tagName === 'H2' || sib.tagName === 'HR' || (sib.tagName === 'P' && !sib.textContent.trim()))) {
      sib = sib.nextElementSibling;
    }
    if (sib && sib.tagName === 'P' && !sib.classList.contains('dek')) {
      sib.classList.add('lead');
    }
  }

  // 4. Short h2s rendered as statements (like "You.")
  el.querySelectorAll('h2').forEach(h2 => {
    const words = h2.textContent.trim().split(/\s+/);
    if (words.length <= 2 && h2.textContent.trim().length <= 12) {
      h2.classList.add('statement');
    }
  });

  // 4b. Collateral "You." — delayed reveal
  if (document.body.getAttribute('data-slug') === 'the-collateral') {
    const first = el.querySelector('h2.statement');
    if (first) first.classList.add('reveal');
  }

  // 5. Timeline-style list items: <li> starting with <strong>date:</strong>
  el.querySelectorAll('li').forEach(li => {
    const strong = li.querySelector('strong:first-child');
    if (strong && /:\s*$/.test(strong.textContent)) {
      li.classList.add('tl-item');
    }
  });

  // 6. Wrap standalone images in <figure> with caption
  //    Markdown: ![alt](src) → <p><img alt="alt" src="src"></p>
  //    Alt text becomes figcaption. Title attr becomes credit line.
  //    Add class="wide" in alt to get full-bleed: ![wide: caption](src)
  el.querySelectorAll('p > img:only-child').forEach(img => {
    const p = img.parentElement;
    const fig = document.createElement('figure');
    const alt = (img.getAttribute('alt') || '').trim();
    const title = (img.getAttribute('title') || '').trim();

    // Parse flags from alt prefix: wide, sm, md, right, left
    // e.g. ![sm right: caption text](src) → figure.sm.right
    let caption = alt;
    const flagRe = /^((?:(?:wide|sm|md|right|left)\s*)+)[:]\s*/i;
    const flagMatch = caption.match(flagRe);
    if (flagMatch) {
      flagMatch[1].trim().split(/\s+/).forEach(f => fig.classList.add(f.toLowerCase()));
      caption = caption.replace(flagRe, '');
    }

    fig.appendChild(img);

    if (caption || title) {
      const fc = document.createElement('figcaption');
      let html = caption;
      if (title) html += `<span class="credit">${title}</span>`;
      fc.innerHTML = html;
      fig.appendChild(fc);
    }

    p.replaceWith(fig);
  });

  // 7. Remove empty paragraphs
  el.querySelectorAll('p').forEach(p => {
    if (!p.textContent.trim() && !p.querySelector('img')) p.remove();
  });
}

function render() {
  const slug = getCurrentSlug();
  const idx = parts.findIndex(p => p.slug === slug);
  const part = parts[idx] || parts[0];

  document.body.setAttribute('data-slug', part.slug);
  document.title = part.short + ' \u2014 DEAL';

  // Current article label in nav
  document.getElementById('navCurrent').textContent = part.short;

  // TOC — articles list (section links added after markdown loads)
  const nums = ['I','II','III','IV','V','VI','VII'];
  document.getElementById('toc').innerHTML = parts.map((p,i) =>
    `<a href="#${p.slug}" class="${p.slug===slug?'active':''}"><span class="part-num">${nums[i]}</span>${p.short.replace(/^[IVX]+\.\s*/,'')}</a>`
  ).join('') + '<div class="toc-sections" id="tocSections"></div>';

  // Prev/next
  const pn = document.getElementById('prevnext');
  let h = '';
  if (idx > 0) {
    h += `<a href="#${parts[idx-1].slug}" class="prev">\u2190 Previous<span>${parts[idx-1].short}</span></a>`;
  } else {
    h += `<a href="index.html" class="prev">\u2190 Overview<span>DEAL</span></a>`;
  }
  if (idx < parts.length-1) {
    h += `<a href="#${parts[idx+1].slug}" class="next">Next \u2192<span>${parts[idx+1].short}</span></a>`;
  }
  pn.innerHTML = h;

  // Load markdown
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading\u2026</div>';
  fetch('md/' + part.file)
    .then(r => { if(!r.ok) throw new Error('fetch'); return r.text(); })
    .then(md => {
      content.innerHTML = marked.parse(md);
      try { enhance(content); } catch(e) { console.warn('enhance:', e); }

      // Build section jump links from h2s
      try {
        const secs = document.getElementById('tocSections');
        const h2s = Array.from(content.querySelectorAll('h2'));
        if (h2s.length > 0) {
          secs.innerHTML = h2s.map((h2, i) => {
            const id = 'section-' + i;
            h2.id = id;
            return `<a href="javascript:void(0)" data-section="${id}" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'});document.querySelector('.toc').classList.remove('open')">${h2.textContent}</a>`;
          }).join('');
          observeSections();
        } else {
          secs.style.display = 'none';
        }
      } catch(e) { console.warn('toc sections:', e); }

      window.scrollTo(0,0);
      document.querySelector('.toc').classList.remove('open');
    })
    .catch(e => {
      if (location.protocol === 'file:') {
        content.innerHTML = '<div style="padding:80px 0;text-align:center;color:var(--faint);font-family:\'Libre Franklin\',sans-serif;font-size:14px;line-height:2">'
          + '<div style="margin-bottom:16px;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ghost)">Local file</div>'
          + 'Markdown loading requires a server.<br>'
          + '<code style="display:inline-block;margin-top:12px;padding:8px 16px;background:var(--code-bg);font-size:13px;letter-spacing:0;border:1px solid var(--code-border)">./serve</code>'
          + '</div>';
      } else {
        content.innerHTML = '<p style="padding:120px 0;text-align:center;color:var(--faint)">This installment is not yet available.</p>';
        console.error('Load failed:', e);
      }
    });
}

window.addEventListener('hashchange', render);
render();

/* ── Progress bar ── */
const progressBar = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  progressBar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0';
}, {passive: true});

/* ── Close TOC on outside click or Escape ── */
const tocEl = document.querySelector('.toc');
document.addEventListener('click', e => {
  if (tocEl.classList.contains('open') && !tocEl.contains(e.target) && !e.target.closest('.toc-btn')) {
    tocEl.classList.remove('open');
  }
});

/* ── Keyboard navigation ── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') { tocEl.classList.remove('open'); return; }
  const slug = getCurrentSlug();
  const idx = parts.findIndex(p => p.slug === slug);
  if (e.key === 'ArrowLeft' && idx > 0) {
    window.location.hash = parts[idx - 1].slug;
  } else if (e.key === 'ArrowRight' && idx < parts.length - 1) {
    window.location.hash = parts[idx + 1].slug;
  }
});

/* ── Active section tracking ── */
let sectionObserver;
function observeSections() {
  if (sectionObserver) sectionObserver.disconnect();
  const h2s = document.querySelectorAll('#content h2[id]');
  if (!h2s.length) return;
  sectionObserver = new IntersectionObserver(entries => {
    entries.forEach(ent => {
      if (ent.isIntersecting) {
        document.querySelectorAll('.toc-sections a').forEach(a => a.classList.remove('active-section'));
        const link = document.querySelector(`.toc-sections a[data-section="${ent.target.id}"]`);
        if (link) link.classList.add('active-section');
      }
    });
  }, {rootMargin: '-20% 0px -60% 0px'});
  h2s.forEach(h2 => sectionObserver.observe(h2));
}
</script>
</body>
</html>
